services:

  db:
    image: postgres:16-alpine
    container_name: quicksplit-db
    environment:
      POSTGRES_DB: quicksplit
      POSTGRES_USER: quicksplit
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quicksplit}
    volumes:
      - quicksplit-data:/var/lib/postgresql/data
    networks:
      - quicksplit-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quicksplit -d quicksplit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quicksplit-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/quicksplit
      SPRING_DATASOURCE_USERNAME: quicksplit
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-quicksplit}
      # IMPORTANTE: en un entorno real, cambiar por un secreto fuerte (>= 32 caracteres).
      QUICKSPLIT_JWT_SECRET: ${QUICKSPLIT_JWT_SECRET:-cambia-este-secreto-en-produccion-0123456789abcdef}
      CORS_ALLOWED_ORIGINS: http://localhost:8088
    ports:
      - "8080:8080"
    networks:
      - quicksplit-net
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quicksplit-frontend
    depends_on:
      - backend
    ports:
      - "8088:80"
    networks:
      - quicksplit-net
    mem_limit: 128m

networks:
  quicksplit-net:
    driver: bridge

volumes:
  quicksplit-data:
