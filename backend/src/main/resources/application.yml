spring:
  application:
    name: quicksplit-backend
  datasource:
    url: jdbc:h2:mem:quicksplit;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  h2:
    console:
      enabled: false

server:
  port: 8080

# Configuracion de la aplicacion (sobreescribir por variables de entorno en prod)
quicksplit:
  jwt:
    # Clave SOLO para desarrollo local. En prod se inyecta por QUICKSPLIT_JWT_SECRET.
    secret: ${QUICKSPLIT_JWT_SECRET:dev-secret-change-me-please-0123456789abcdef0123456789abcdef}
    # Expiracion del token en milisegundos (24h)
    expiration-ms: ${QUICKSPLIT_JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.quicksplit: INFO
