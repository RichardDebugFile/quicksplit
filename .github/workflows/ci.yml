name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend · build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compilar, testear y empaquetar (mvn verify)
        working-directory: backend
        run: mvn -B verify --no-transfer-progress

      - name: Publicar resultados de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
            backend/target/site/jacoco/

      - name: Publicar JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  frontend:
    name: Frontend · build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Linter
        working-directory: frontend
        run: npm run lint

      - name: Tests con cobertura
        working-directory: frontend
        run: npm run coverage

      - name: Build de produccion
        working-directory: frontend
        run: npm run build

      - name: Publicar build del frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker:
    name: Docker · validar imagenes
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build de imagenes (sin publicar)
        run: docker compose build
