name: SAST - SonarQube

# Analisis estatico de seguridad (SAST) con SonarQube Cloud (SonarCloud).
# Requiere el secreto SONAR_TOKEN configurado en el repositorio
# (Settings -> Secrets and variables -> Actions).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube · analisis SAST
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - uses: actions/checkout@v4
        with:
          # Historial completo: mejora la asignacion de issues por autor/fecha.
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Backend · compilar + cobertura (JaCoCo)
        working-directory: backend
        run: mvn -B verify --no-transfer-progress

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend · dependencias + cobertura (lcov)
        working-directory: frontend
        run: |
          npm ci
          npm run coverage

      # El plan Free de SonarCloud solo permite la rama principal. Nos aseguramos de que la
      # rama principal del proyecto se llame 'main' (igual que en GitHub) para que el analisis
      # del push a main se trate como rama principal y no como rama secundaria (bloqueada).
      - name: Asegurar rama principal 'main' en SonarCloud
        if: ${{ env.SONAR_TOKEN != '' }}
        continue-on-error: true
        run: |
          KEY=$(grep '^sonar.projectKey=' sonar-project.properties | cut -d'=' -f2)
          # Si analisis previos crearon una rama secundaria 'main', se elimina para evitar colision.
          curl -s -u "${SONAR_TOKEN}:" -X POST \
            "https://sonarcloud.io/api/project_branches/delete?project=${KEY}&branch=main" \
            -o /dev/null -w "delete stray branch main -> HTTP %{http_code}\n" || true
          # Se renombra la rama principal del proyecto a 'main' (idempotente).
          curl -s -u "${SONAR_TOKEN}:" -X POST \
            "https://sonarcloud.io/api/project_branches/rename?project=${KEY}&name=main" \
            -o /dev/null -w "rename main branch -> HTTP %{http_code}\n" || true

      - name: SonarQube Scan (SAST)
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Exportar retroalimentacion de Sonar como artefacto
        if: ${{ env.SONAR_TOKEN != '' }}
        continue-on-error: true
        run: |
          PROJECT_KEY=$(grep '^sonar.projectKey=' sonar-project.properties | cut -d'=' -f2)
          mkdir -p sonar-report

          # 1) Esperar a que SonarCloud TERMINE de procesar el analisis (Compute Engine task).
          REPORT_TASK=$(find . -name report-task.txt | head -n1)
          TASK_URL=$(grep '^ceTaskUrl=' "$REPORT_TASK" | cut -d'=' -f2-)
          echo "Tarea de analisis: $TASK_URL"
          for i in $(seq 1 40); do
            STATUS=$(curl -s -u "${SONAR_TOKEN}:" "$TASK_URL" | jq -r '.task.status')
            echo "Intento $i -> estado: $STATUS"
            [ "$STATUS" = "SUCCESS" ] && break
            { [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; } && break
            sleep 6
          done
          # Pequena espera para que el indice de busqueda propague tras el procesamiento.
          sleep 8

          # 2) Ya procesado: descargar la retroalimentacion real de la rama principal.
          # Issues (vulnerabilidades, bugs, code smells)
          curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${PROJECT_KEY}&ps=500" \
            -o sonar-report/sonar-issues.json
          # Estado del Quality Gate
          curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${PROJECT_KEY}" \
            -o sonar-report/quality-gate.json
          # Security hotspots
          curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/hotspots/search?projectKey=${PROJECT_KEY}&ps=500" \
            -o sonar-report/security-hotspots.json
          # Metricas resumidas
          curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&metricKeys=bugs,vulnerabilities,security_hotspots,code_smells,coverage,duplicated_lines_density,ncloc" \
            -o sonar-report/measures.json

          # 3) Resumen legible.
          {
            echo "===== Retroalimentacion SAST - SonarQube ====="
            echo "Proyecto : ${PROJECT_KEY}"
            echo "Dashboard: https://sonarcloud.io/project/overview?id=${PROJECT_KEY}"
            echo "Quality Gate: $(jq -r '.projectStatus.status' sonar-report/quality-gate.json)"
            echo "Issues totales: $(jq -r '.total' sonar-report/sonar-issues.json)"
            echo "Security Hotspots: $(jq -r '.paging.total' sonar-report/security-hotspots.json)"
            echo "--- Metricas ---"
            jq -r '.component.measures[]? | "\(.metric): \(.value)"' sonar-report/measures.json
          } > sonar-report/RESUMEN.txt
          cat sonar-report/RESUMEN.txt

      - name: Publicar artefacto de retroalimentacion SAST
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sast-sonarqube-report
          path: sonar-report/
