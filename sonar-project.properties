# ============================================================
#  Configuracion de SonarQube Cloud (SonarCloud) para QuickSplit
#  -> SAST de backend (Java) y frontend (TypeScript) en un solo proyecto.
#
#  IMPORTANTE: reemplaza las dos lineas siguientes con los valores
#  de TU organizacion/proyecto en https://sonarcloud.io
# ============================================================
sonar.organization=TU_ORG_SONARCLOUD
sonar.projectKey=TU_ORG_SONARCLOUD_quicksplit

sonar.projectName=QuickSplit
sonar.projectVersion=1.0.0

# --- Codigo fuente que se analiza (el objetivo del SAST) ---
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java
sonar.test.inclusions=frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx

# --- Java: binarios compilados (Sonar los necesita para el analisis) ---
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
sonar.java.source=17

# --- Reportes de cobertura ---
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# --- Exclusiones y codificacion ---
sonar.exclusions=**/node_modules/**,frontend/dist/**,**/target/**
sonar.sourceEncoding=UTF-8
